name: CI

permissions:
  contents: read

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout catnet-scanner
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          path: catnet-scanner

      - name: Checkout catnet-core
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: mendsec/catnet-core
          token: ${{ secrets.GH_PAT }}
          path: catnet-core

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.26.x'
          
      - name: Install Linux Dependencies
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Mock frontend dist
        working-directory: catnet-scanner
        run: mkdir -p frontend/dist; echo "mock" > frontend/dist/index.html

      - name: Backend test
        working-directory: catnet-scanner
        env:
          CGO_ENABLED: 1
        run: go test -race -v ./...

  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout catnet-scanner
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          path: catnet-scanner

      - name: Checkout catnet-core
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: mendsec/catnet-core
          path: catnet-core

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: catnet-scanner/frontend
        run: bun install

      - name: Build frontend
        working-directory: catnet-scanner/frontend
        run: bun run build
