name: CI

permissions:
  contents: read

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout catnet-scanner
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          path: catnet-scanner

      - name: Checkout catnet-core
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: mendsec/catnet-core
          token: ${{ secrets.GH_PAT }}
          path: catnet-core

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: '1.26.x'
          
      - name: Install Linux Dependencies
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Mock frontend dist
        working-directory: catnet-scanner
        run: mkdir -p frontend/dist; echo "mock" > frontend/dist/index.html

      - name: Backend test
        working-directory: catnet-scanner
        env:
          CGO_ENABLED: 1
        run: go test -race -v ./...

  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout catnet-scanner
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          path: catnet-scanner

      - name: Checkout catnet-core
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: mendsec/catnet-core
          path: catnet-core

      - name: Setup Bun
        uses: oven-sh/setup-bun@f4d14e03ff726c06358e5557344e1da148b56cf7 # v1.2.2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: catnet-scanner/frontend
        run: bun install

      - name: Build frontend
        working-directory: catnet-scanner/frontend
        run: bun run build
