name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: windows/amd64
            name: catnet-windows.exe
          - os: ubuntu-22.04
            platform: linux/amd64
            name: catnet-linux
          - os: macos-latest
            platform: darwin/universal
            name: catnet-macos
    runs-on: ${{ matrix.os }}
    
    steps:
    - uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.23'

    - name: Set up Bun
      uses: oven-sh/setup-bun@v2

    - name: Install Wails
      run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

    - name: Install Linux Dependencies
      if: runner.os == 'Linux'
      run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev

    - name: Build Wails App
      run: wails build -platform ${{ matrix.platform }}

    - name: Rename build
      run: |
        if [ "$RUNNER_OS" == "Windows" ]; then
          mv build/bin/*.exe build/bin/${{ matrix.name }}
        else
          mv build/bin/* build/bin/${{ matrix.name }}
        fi
      shell: bash

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.name }}
        path: build/bin/${{ matrix.name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: artifacts/**/*
