name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: windows/amd64
            name: catnet-windows.exe
          - os: ubuntu-22.04
            platform: linux/amd64
            name: catnet-linux
          - os: macos-latest
            platform: darwin/universal
            name: catnet-macos
    runs-on: ${{ matrix.os }}
    
    steps:
    - name: Checkout catnet-scanner
      uses: actions/checkout@v7
      with:
        path: catnet-scanner

    - name: Checkout catnet-core
      uses: actions/checkout@v7
      with:
        repository: mendsec/catnet-core
        path: catnet-core

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.26.x'

    - name: Set up Bun
      uses: oven-sh/setup-bun@v2

    - name: Install Wails
      run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

    - name: Install Linux Dependencies
      if: runner.os == 'Linux'
      run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

    - name: Build Wails App
      working-directory: catnet-scanner
      run: wails build -platform ${{ matrix.platform }}

    - name: Rename build
      working-directory: catnet-scanner
      run: |
        if [ "$RUNNER_OS" == "Windows" ]; then
          mv build/bin/*.exe build/bin/${{ matrix.name }}
        else
          mv build/bin/* build/bin/${{ matrix.name }}
        fi
      shell: bash

    - name: Upload Artifact
      uses: actions/upload-artifact@v7
      with:
        name: ${{ matrix.name }}
        path: catnet-scanner/build/bin/${{ matrix.name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Checkout catnet-scanner
      uses: actions/checkout@v7
      with:
        path: catnet-scanner

    - name: Download all artifacts
      uses: actions/download-artifact@v8
      with:
        path: artifacts

    - name: Extract Release Notes
      id: extract-notes
      working-directory: catnet-scanner
      run: |
        VERSION=${GITHUB_REF#refs/tags/}
        VERSION_NO_V=${VERSION#v}
        awk "/## \[$VERSION_NO_V\]/{flag=1; print; next} /## \[/{if(flag) exit} flag" CHANGELOG.md > RELEASE_NOTES.md

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: artifacts/**/*
        body_path: catnet-scanner/RELEASE_NOTES.md
