name: Sync develop → main

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 06:00 UTC
  workflow_dispatch:       # Allow manual trigger

permissions:
  contents: read
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout develop
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: develop
          fetch-depth: 0

      - name: Check if ahead of main
        id: check_ahead
        shell: bash
        run: |
          AHEAD=$(git rev-list --count origin/main..origin/develop)
          echo "ahead=$AHEAD" >> "$GITHUB_OUTPUT"
          echo "Develop is $AHEAD commit(s) ahead of main."

      - name: Create or update sync PR
        if: steps.check_ahead.outputs.ahead > 0
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          PR_EXISTS=$(gh pr list --repo ${{ github.repository }} --base main --head develop --state open --json number --jq 'length')
          if [ "$PR_EXISTS" -gt 0 ]; then
            echo "Sync PR already exists — updating body."
            gh pr edit --repo ${{ github.repository }} --base main --head develop \
              --body "Automated sync from develop → main.

          $(gh pr diff --repo ${{ github.repository }} main..develop --stat 2>/dev/null || echo 'No diff available.')"
          else
            gh pr create --repo ${{ github.repository }} --base main --head develop \
              --title "chore: weekly sync develop → main" \
              --body "Automated weekly sync PR.

          ## Changes ahead of main

          \`\`\`
          $(gh pr diff --repo ${{ github.repository }} main..develop --stat 2>/dev/null || echo 'Unable to compute diff stat.')
          \`\`\`

          > PR created automatically by the \`sync-main.yml\` workflow."
          fi
