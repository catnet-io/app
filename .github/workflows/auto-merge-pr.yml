name: Auto Merge PR (develop → main)

on:
  push:
    branches: [develop]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-and-pr:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Setup GPG signing
        env:
          GPG_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          if [ -z "$GPG_KEY" ]; then
            echo "GPG_PRIVATE_KEY is not set, cannot sign commits."
            exit 1
          fi
          echo "$GPG_KEY" | gpg --batch --import
          KEY_ID=$(gpg --list-secret-keys --keyid-format LONG | awk '/^sec/ {print $2}' | cut -d/ -f2)
          echo "Imported GPG key: $KEY_ID"
          git config user.signingkey "$KEY_ID"
          git config commit.gpgsign true
          git config user.name "mendsec"
          git config user.email "fabiomendesilva@gmail.com"
          echo "GPG signing configured."

      - name: Sync develop if behind main
        run: |
          git fetch origin main develop --depth=100
          BEHIND=$(git rev-list --count origin/develop..origin/main 2>/dev/null || echo "0")
          if [ "$BEHIND" -gt "0" ]; then
            echo "Develop is $BEHIND commit(s) behind main. Fast-forwarding..."
            git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
            git push origin origin/main:develop
            echo "Develop synced to main."
          fi

      - name: Check for new commits on develop
        run: |
          COUNT=$(git rev-list --count origin/main..origin/develop 2>/dev/null || echo "0")
          if [ "$COUNT" -eq "0" ]; then
            echo "No new commits, nothing to do."
            exit 0
          fi
          echo "New commits: $COUNT"

      - name: Create signed branch
        run: |
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          git checkout -B develop-signed origin/develop
          git filter-branch -f \
            --env-filter '
              export GIT_COMMITTER_NAME="mendsec"
              export GIT_COMMITTER_EMAIL="fabiomendesilva@gmail.com"
              export GIT_AUTHOR_NAME="mendsec"
              export GIT_AUTHOR_EMAIL="fabiomendesilva@gmail.com"
            ' \
            --commit-filter 'git commit-tree -S "$@"' \
            origin/main..HEAD
          echo "Signed commits pushed to develop-signed."
          git push origin HEAD:develop-signed --force-with-lease

      - name: Close old PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for HEAD in develop develop-signed; do
            OLD_PR=$(gh pr list --head "$HEAD" --base main --json number -q '.[0].number' 2>/dev/null || echo "")
            if [ -n "$OLD_PR" ]; then
              gh pr close "$OLD_PR" --comment "Replaced by signed PR." 2>/dev/null || true
              echo "Closed old PR #$OLD_PR (head: $HEAD)."
            fi
          done

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --base main \
            --head develop-signed \
            --title "chore: merge develop → main" \
            --body "Automated PR by github-actions[bot].

        Commits on \`develop-signed\` are GPG-signed using the repository's automation key." \
            || echo "PR already exists, skipping."
