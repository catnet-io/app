name: Auto Merge PR

on:
  push:
    branches: [develop]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-and-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Setup GPG signing
        env:
          GPG_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: echo "GPG_KEY is set: ${{ secrets.GPG_PRIVATE_KEY != '' }}"

      - name: Sync develop if behind main
        run: |
          git fetch origin main develop --depth=100
          BEHIND=$(git rev-list --count origin/develop..origin/main 2>/dev/null || echo "0")
          echo "Behind main by: $BEHIND"

      - name: Create signed branch
        run: |
          COUNT=$(git rev-list --count origin/main..origin/develop 2>/dev/null || echo "0")
          echo "New commits: $COUNT"
          if [ "$COUNT" -eq "0" ]; then echo "Nothing to do"; exit 0; fi
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          git checkout -B develop-signed origin/develop
          echo "Created develop-signed branch"

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create --base main --head develop-signed --title "chore: merge develop into main" --body "Automated PR." || echo "exists"